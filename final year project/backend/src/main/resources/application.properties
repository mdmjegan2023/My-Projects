spring.application.name=fundtracker-backend

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/fundtracker
spring.data.mongodb.database=fundtracker

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
app.jwt.secret=FundTrackerEnterpriseSecretKey2024ThisShouldBeAtLeast256BitsLong
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.fundtracker=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
